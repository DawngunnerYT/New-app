<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#040308"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>DAWN · AI RPG Chronicles</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%;height:100dvh;overflow:hidden;background:#040308}
    body{-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
    #dawn-loader{
      position:fixed;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;background:#040308;
      font-family:'Georgia',serif;color:#c0a040;gap:18px;z-index:9999;
    }
    #dawn-loader-bg{position:absolute;inset:0;z-index:-1;width:100%;height:100%;}
    #dawn-loader h1{font-size:28px;letter-spacing:6px;color:#e8c060;}
    #dawn-loader .bar-wrap{width:280px;height:4px;background:#1a1408;border-radius:2px;}
    #dawn-loader .bar{height:4px;background:#c0a040;border-radius:2px;width:0%;transition:width 0.3s;}
    #dawn-loader .status{font-size:11px;color:#6a5020;letter-spacing:2px;text-transform:uppercase;}
    #dawn-loader .err{color:#c04040;font-size:12px;max-width:320px;text-align:center;line-height:1.6;}
    #dawn-mode-select{display:none;flex-direction:row;gap:16px;margin-top:6px;}
    .dawn-mode-btn{
      padding:10px 28px;border:1px solid #c0a040;background:transparent;
      color:#e8c060;font-family:'Georgia',serif;font-size:13px;letter-spacing:2px;
      text-transform:uppercase;cursor:pointer;border-radius:2px;transition:background .2s,color .2s;
    }
    .dawn-mode-btn:hover{background:#c0a040;color:#040308;}
    #btn-back{
      display:none;position:absolute;top:24px;left:24px;
      padding:7px 18px;border:1px solid #6a5020;background:transparent;
      color:#6a5020;font-family:'Georgia',serif;font-size:11px;letter-spacing:2px;
      text-transform:uppercase;cursor:pointer;border-radius:2px;
      transition:border-color .2s,color .2s;
    }
    #btn-back:hover{border-color:#c0a040;color:#e8c060;}
  </style>
</head>
<body>
  <div id="dawn-loader">
    <div id="dawn-loader-bg"></div>
    <button id="btn-back">← Title</button>
    <h1>DAWN</h1>
    <div class="bar-wrap"><div class="bar" id="load-bar"></div></div>
    <div class="status" id="load-status">Initializing…</div>
    <div id="dawn-mode-select">
      <button class="dawn-mode-btn" id="btn-online">▶ Play Online</button>
      <button class="dawn-mode-btn" id="btn-local">⬡ Play Local</button>
    </div>
  </div>
  <div id="root"></div>

  <!-- React & Babel -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  
  <!-- External Services -->
  <script src="https://js.puter.com/v2/"></script>

  <!-- Use original loader.js from Supabase (no modular components yet) -->
  <script src="https://impbfulyppuewichpsel.supabase.co/storage/v1/object/public/dawn/dawn-loader.js"></script>
</body>
</html>
