<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#040308"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>DAWN · AI RPG Chronicles</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%;height:100dvh;overflow:hidden;background:#040308}
    body{-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
    #dawn-loader{
      position:fixed;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;background:#040308;
      font-family:'Georgia',serif;color:#c0a040;gap:18px;z-index:9999;
    }
    #dawn-loader h1{font-size:28px;letter-spacing:6px;color:#e8c060;}
    #dawn-loader .bar-wrap{width:280px;height:4px;background:#1a1408;border-radius:2px;}
    #dawn-loader .bar{height:4px;background:#c0a040;border-radius:2px;width:0%;transition:width 0.3s;}
    #dawn-loader .status{font-size:11px;color:#6a5020;letter-spacing:2px;text-transform:uppercase;}
    #dawn-loader .err{color:#c04040;font-size:12px;max-width:320px;text-align:center;line-height:1.6;}
  </style>
</head>
<body>
  <div id="dawn-loader">
    <h1>DAWN</h1>
    <div class="bar-wrap"><div class="bar" id="load-bar"></div></div>
    <div class="status" id="load-status">Initializing…</div>
  </div>
  <div id="root"></div>

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <!-- ░░ Device Detection — runs before anything else ░░ -->
  <script>
  window.DeviceProfile = (() => {
    function isMobileUA() {
      return /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile|mobile/i
        .test(navigator.userAgent);
    }
    function isTouchOnly() {
      return navigator.maxTouchPoints > 1 && !window.matchMedia('(pointer: fine)').matches;
    }
    function hasDesktopGPU() {
      try {
        const gl = document.createElement('canvas').getContext('webgl2')
                || document.createElement('canvas').getContext('webgl');
        if (!gl) return false;
        const ext = gl.getExtension('WEBGL_debug_renderer_info');
        if (!ext) return true;
        const r = gl.getParameter(ext.UNMASKED_RENDERER_WEBGL) || '';
        return !/Adreno|Mali|PowerVR|Apple GPU|Tegra|VideoCore/i.test(r);
      } catch { return false; }
    }

    const mobile  = isMobileUA() || isTouchOnly();
    const cores   = navigator.hardwareConcurrency || 1;
    const ram     = navigator.deviceMemory || null;
    const goodGPU = hasDesktopGPU();

    const canRunHeavy = !mobile && goodGPU && cores >= 4 && (ram === null || ram >= 4);

    const tier = canRunHeavy ? 'full' : (!mobile && cores >= 2) ? 'lite' : 'minimal';

    // Tag <html> so CSS can react: html[data-tier="minimal"] .gpu-only { display:none }
    document.documentElement.setAttribute('data-tier',    tier);
    document.documentElement.setAttribute('data-mobile',  mobile);
    document.documentElement.setAttribute('data-android', /Android/i.test(navigator.userAgent));

    const profile = {
      tier, mobile,
      isAndroid : /Android/i.test(navigator.userAgent),
      isIOS     : /iPhone|iPad|iPod/i.test(navigator.userAgent),
      cores, ram, goodGPU,
      // Gates — cloud APIs are always allowed; only local heavy compute is gated
      allowLocalLLM  : tier === 'full' || tier === 'lite',
      allowSDXL      : tier === 'full',
      allowGPUTasks  : tier === 'full',
      allowCloudAPI  : true,   // ← always true; phone does zero work for API calls
    };

    console.log('[DAWN] Device profile →', profile);
    return profile;
  })();
  </script>

  <!-- ░░ DAWN Bootstrap ░░ -->
  <script>
  (async () => {
    const BUCKET = 'https://impbfulyppuewichpsel.supabase.co/storage/v1/object/public/dawn';
    try {
      const r = await fetch(BUCKET + '/dawn-loader.js', { cache: 'no-cache' });
      if (!r.ok) throw new Error('dawn-loader.js → HTTP ' + r.status);
      const el = document.createElement('script');
      el.textContent = await r.text();
      document.head.appendChild(el);
    } catch (e) {
      console.error('[DAWN bootstrap]', e);
      document.getElementById('load-status').textContent = '';
      const d = document.createElement('div');
      d.className = 'err';
      d.textContent = '❌ Load failed: ' + e.message;
      document.getElementById('dawn-loader').appendChild(d);
      document.getElementById('load-bar').style.background = '#c04040';
    }
  })();
  </script>
</body>
</html>
